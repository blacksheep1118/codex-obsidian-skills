name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install --upgrade -r skill/ppt-to-md-for-obsidian/requirements-dev.txt -r skill/obsidian-vault-organizer/requirements-dev.txt -r skill/web-course-notes-for-obsidian/requirements-dev.txt

      - name: Run full validation suite
        run: python scripts/validate_all.py
