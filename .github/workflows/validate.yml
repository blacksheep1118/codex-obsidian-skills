name: Validate Skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -c "from pathlib import Path; import subprocess, sys; reqs = sorted(Path('skill').glob('*/requirements-dev.txt')); print('Installing dev requirements:'); [print(f'  {path}') for path in reqs]; cmd = [sys.executable, '-m', 'pip', 'install']; [cmd.extend(['-r', str(path)]) for path in reqs]; subprocess.check_call(cmd)"

      - name: Run full validation suite
        run: python scripts/validate_all.py
