name: Validate Skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  root:
    name: Root validation (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install root validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest>=8.0.0,<9.0.0" "PyYAML>=6.0"

      - name: Check repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: Run root tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q

      - name: Check shared metadata
        run: |
          python scripts/check_openai_yaml_sync.py
          python scripts/sync_shared_resources.py --check
          python scripts/install_skill.py --all --dry-run --self-check

  skill:
    name: Skill validation (${{ matrix.skill }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - skill: notes-to-scientific-ppt
            validator: scripts/validate_skill.py
          - skill: obsidian-vault-organizer
            validator: scripts/validate_skill.py
          - skill: ppt-to-md-for-obsidian
            validator: scripts/validate_skill_repo.py
          - skill: web-course-notes-for-obsidian
            validator: scripts/validate_skill.py

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install this skill's dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r skill/${{ matrix.skill }}/requirements-dev.txt

      - name: Compile skill scripts
        working-directory: skill/${{ matrix.skill }}
        run: python -m compileall scripts

      - name: Run skill tests
        working-directory: skill/${{ matrix.skill }}
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -q tests

      - name: Validate skill metadata
        working-directory: skill/${{ matrix.skill }}
        run: python ${{ matrix.validator }}
